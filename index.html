<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fawaaid Tube</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .video-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; padding-bottom: 70px; }
        .video-container::-webkit-scrollbar { display: none; }
        
        .video-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .video-frame {
            position: relative;
            width: 95%; 
            height: 82vh;
            border-radius: 24px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .iframe-wrapper {
            position: absolute;
            top: -10%; left: -10%; 
            width: 120%; height: 120%;
            z-index: 1;
        }
        iframe { width: 100%; height: 100%; pointer-events: auto; }

        .top-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 5;
            pointer-events: none;
        }

        .ui-overlay {
            position: absolute; bottom: 80px; right: 20px;
            display: flex; flex-direction: column; gap: 20px; z-index: 20;
        }

        /* Panel Universal */
        .side-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: white; border-radius: 24px 24px 0 0; transition: 0.3s; z-index: 50;
            display: flex; flex-direction: column; padding-bottom: 70px;
        }
        .side-panel.active { bottom: 0; }

        #welcome-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 100; display: none; align-items: center; justify-content: center;
            transition: opacity 0.3s ease; opacity: 0;
        }
        .modal-content {
            background: #1a1a1a; width: 90%; max-width: 400px; max-height: 80vh;
            border-radius: 28px; padding: 24px; color: white; border: 1px solid #333;
            overflow-y: auto; position: relative;
        }

        .nav-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #000; border-top: 1px solid #222;
            display: grid; grid-template-columns: repeat(5, 1fr);
            align-items: center; z-index: 60; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #666; font-size: 10px; transition: 0.3s; background: none; border: none;
        }
        .nav-item.active { color: #ef4444; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="welcome-modal">
    <div class="modal-content text-center">
        <h1 class="text-2xl font-bold text-red-500 mb-4">Fitur Aplikasi</h1>
        <div class="grid grid-cols-1 gap-3 text-left mb-6 text-sm">
            <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                <p class="font-bold text-red-400">✨ Vertical Loop</p>
                <p class="text-gray-400 text-xs">Video akan berulang terus menerus (Infinite Scrolling).</p>
            </div>
            <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                <p class="font-bold text-red-400">💬 Real-time Comments</p>
                <p class="text-gray-400 text-xs">Diskusi langsung dengan pengguna lain.</p>
            </div>
            <div class="bg-white/5 p-3 rounded-xl border border-white/10">
                <p class="font-bold text-red-400">❤️ Like Sync</p>
                <p class="text-gray-400 text-xs">Sinkronisasi jumlah suka secara otomatis.</p>
            </div>
        </div>
        <button onclick="closeAllPanels()" class="w-full bg-red-600 py-3 rounded-2xl font-bold">Lanjut Menonton</button>
    </div>
</div>

<div id="app" class="video-container"></div>

<nav class="nav-bottom">
    <button onclick="restartApp()" class="nav-item">
        <i class="fas fa-home"></i>
        <span>Home</span>
    </button>
    <button onclick="openFitur()" class="nav-item">
        <i class="fas fa-star"></i>
        <span>Fitur</span>
    </button>
    <button onclick="closeAllPanels()" class="nav-item active">
        <i class="fas fa-play-circle text-2xl"></i>
        <span>Short</span>
    </button>
    <button onclick="openKritik()" class="nav-item">
        <i class="fas fa-edit"></i>
        <span>Kritik</span>
    </button>
    <button onclick="exitApp()" class="nav-item">
        <i class="fas fa-sign-out-alt"></i>
        <span>Back</span>
    </button>
</nav>

<div id="comment-panel" class="side-panel">
    <div class="p-4 border-b flex justify-between items-center text-black">
        <span class="font-bold">Komentar</span>
        <button onclick="closeComments()" class="text-xl">&times;</button>
    </div>
    <div id="comment-list" class="flex-1 overflow-y-auto p-4 space-y-3 text-black text-sm"></div>
    <div class="p-4 border-t flex flex-col gap-2 bg-gray-50">
        <input id="input-nama" type="text" placeholder="Nama..." class="border rounded-lg px-4 py-2 text-black">
        <div class="flex gap-2">
            <input id="input-komen" type="text" placeholder="Tulis komentar..." class="flex-1 border rounded-lg px-4 py-2 text-black">
            <button onclick="sendComment()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold">Kirim</button>
        </div>
    </div>
</div>

<div id="kritik-panel" class="side-panel p-6">
    <div class="flex justify-between items-center mb-4 text-black">
        <h2 class="text-xl font-bold text-red-600">Kritik & Saran</h2>
        <button onclick="closeAllPanels()" class="text-2xl">&times;</button>
    </div>
    <div class="space-y-4">
        <input id="kritik-nama" type="text" placeholder="Nama Anda" class="w-full border rounded-xl px-4 py-3 text-black">
        <textarea id="kritik-pesan" rows="4" placeholder="Tulis masukan Anda..." class="w-full border rounded-xl px-4 py-3 text-black"></textarea>
        <button onclick="kirimKeWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
            <i class="fab fa-whatsapp text-xl"></i> Kirim Masukan
        </button>
    </div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHGTd_JrFphYujz1FZzKwdzaWDpBgA_EH-bA4jw-UQRgnjdRlqXSf2gu1YSYwzZMt6ypv4cF6YIssI/pub?gid=0&single=true&output=csv';
    const COMMENT_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHGTd_JrFphYujz1FZzKwdzaWDpBgA_EH-bA4jw-UQRgnjdRlqXSf2gu1YSYwzZMt6ypv4cF6YIssI/pub?gid=1398913850&single=true&output=csv'; 
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxo5aawfXOV9o4aMPM1XYM1H2ZvWqCzDIHLFHgtizF2SMy6_m396RQ-7ngMeEhtGhYNcg/exec'; 

    let currentVideoId = null;
    let globalLikeData = {};

    function restartApp() {
        const container = document.querySelector('.video-container');
        container.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openFitur() {
        closeAllPanels();
        const modal = document.getElementById('welcome-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.style.opacity = '1', 10);
    }

    function openKritik() {
        closeAllPanels();
        document.getElementById('kritik-panel').classList.add('active');
    }

    function closeAllPanels() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
        const modal = document.getElementById('welcome-modal');
        modal.style.opacity = '0';
        setTimeout(() => modal.style.display = 'none', 300);
    }

    function exitApp() {
        if(confirm("Keluar dari aplikasi?")) window.location.href = "about:blank";
    }

    function kirimKeWhatsApp() {
        const n = document.getElementById('kritik-nama').value.trim() || "Hamba Allah";
        const p = document.getElementById('kritik-pesan').value.trim();
        if(!p) return alert("Pesan kosong");
        window.open(`https://wa.me/6285251675143?text=Halo%20Muzanni,%20saya%20${n}.%0A%0A*Kritik/Saran:*%0A${p}`, '_blank');
    }

    async function updateLikeCounts() {
        try {
            const res = await fetch(COMMENT_CSV_URL + '&t=' + new Date().getTime());
            const text = await res.text();
            const rows = text.split(/\r?\n/).slice(1);
            let counts = {};
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(cols.length >= 2 && cols[1].includes("Like")) {
                    const vid = cols[0].replace(/"/g, '').trim();
                    counts[vid] = (counts[vid] || 0) + 1;
                }
            });
            globalLikeData = counts;
            document.querySelectorAll('.count-like').forEach(span => {
                span.innerText = globalLikeData[span.getAttribute('data-id')] || 0;
            });
        } catch (e) {}
    }

    async function loadVideos() {
        try {
            const res = await fetch(SHEET_CSV_URL);
            const data = await res.text();
            let rows = data.split(/\r?\n/).slice(1).filter(r => r.trim() !== ""); 
            
            // LOGIKA LOOPING: Duplikasi data video agar bisa scroll terus
            const loopRows = [...rows, ...rows, ...rows]; 
            const app = document.getElementById('app');
            app.innerHTML = ''; 
            
            loopRows.forEach((row, index) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 3) {
                    const id = cols[0].replace(/"/g, '').trim();
                    const videoId = cols[2].split('/').pop().split('?')[0];
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="video-frame">
                            <div class="top-mask"></div>
                            <div class="iframe-wrapper">
                                <iframe id="player-${index}" src="https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=0&mute=0&controls=0&modestbranding=1&rel=0&loop=1&playlist=${videoId}" allow="autoplay; encrypted-media"></iframe>
                            </div>
                            <div class="ui-overlay">
                                <button onclick="handleLike('${id}', this)" class="btn-like flex flex-col items-center" data-id="${id}">
                                    <div class="p-3 bg-black/40 rounded-full"><i class="fas fa-heart text-2xl heart-icon text-white"></i></div>
                                    <span class="text-[10px] mt-1 font-bold text-white count-like" data-id="${id}">0</span>
                                </button>
                                <button onclick="showComments('${id}')" class="flex flex-col items-center">
                                    <div class="p-3 bg-black/40 rounded-full text-white"><i class="fas fa-comment-dots text-2xl"></i></div>
                                    <span class="text-[10px] mt-1 font-bold text-white">Komen</span>
                                </button>
                            </div>
                        </div>`;
                    app.appendChild(card);
                }
            });
            setupIntersectionObserver();
            setupInfiniteScroll(); // Aktifkan pendeteksi ujung scroll
            updateLikeCounts();
        } catch (e) {}
    }

    function setupInfiniteScroll() {
        const container = document.querySelector('.video-container');
        container.addEventListener('scroll', () => {
            // Jika hampir sampai bawah, pindah ke tengah list agar terasa looping
            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 50) {
                container.scrollTop = container.scrollHeight / 3;
            }
            // Jika sampai paling atas, lempar ke tengah
            if (container.scrollTop <= 5) {
                container.scrollTop = container.scrollHeight / 3;
            }
        });
    }

    function handleLike(id, btn) {
        const icon = btn.querySelector('.heart-icon');
        const countSpan = btn.querySelector('.count-like');
        if(!icon.classList.contains('text-red-500')) {
            document.querySelectorAll(`.btn-like[data-id="${id}"] .heart-icon`).forEach(i => i.classList.add('text-red-500'));
            document.querySelectorAll(`.count-like[data-id="${id}"]`).forEach(s => s.innerText = parseInt(s.innerText) + 1);
            saveInteraction(id, 'Like');
        }
    }

    function setupIntersectionObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const iframe = entry.target.querySelector('iframe');
                if (entry.isIntersecting) iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                else iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
    }

    async function saveInteraction(vId, type, content = "") {
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ video_id: vId, type: type, content: content }) });
    }

    function showComments(id) {
        currentVideoId = id;
        document.getElementById('comment-panel').classList.add('active');
        loadComments(id);
    }
    
    function closeComments() { document.getElementById('comment-panel').classList.remove('active'); }

    async function loadComments(videoId) {
        const list = document.getElementById('comment-list');
        list.innerHTML = '<p class="text-center italic text-gray-400">Memuat...</p>';
        try {
            const res = await fetch(COMMENT_CSV_URL + '&t=' + new Date().getTime());
            const text = await res.text();
            const rows = text.split(/\r?\n/).slice(1);
            list.innerHTML = '';
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$) /);
                if(cols[0].includes(videoId) && cols[1].includes("Comment")) {
                    const div = document.createElement('div');
                    div.className = "border-b pb-2";
                    const parts = cols[2].split(': ');
                    div.innerHTML = `<p class="text-[10px] font-bold text-red-500">${parts[0]}</p><p>${parts.slice(1).join(': ')}</p>`;
                    list.prepend(div);
                }
            });
        } catch (e) {}
    }

    async function sendComment() {
        const n = document.getElementById('input-nama').value || "Hamba Allah";
        const k = document.getElementById('input-komen').value;
        if(!k) return;
        saveInteraction(currentVideoId, 'Comment', `${n}: ${k}`);
        document.getElementById('input-komen').value = '';
        setTimeout(() => loadComments(currentVideoId), 500);
    }

    loadVideos();
</script>
</body>
</html>
